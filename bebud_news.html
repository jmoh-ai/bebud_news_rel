<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비벗 뉴스 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f7f6f2;color:#1a1a1a;min-height:100vh;padding:1.5rem}
.container{max-width:720px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;letter-spacing:-0.02em}
.header p{font-size:12px;color:#888;margin-top:3px}
.view-tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #e5e3dc}
.view-tab{padding:8px 18px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;font-family:'Pretendard',sans-serif}
.view-tab.active{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-tab{padding:5px 14px;border-radius:20px;border:1px solid #e0ded6;font-size:12px;cursor:pointer;background:#fff;color:#666;transition:all 0.15s;font-family:'Pretendard',sans-serif}
.cat-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.kw-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.kw-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#eeecea;color:#666}
.notice{font-size:11px;color:#999;background:#f0efe9;padding:8px 12px;border-radius:8px;margin-bottom:14px;line-height:1.7}
.card{background:#fff;border:1px solid #e8e6de;border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.15s;margin-bottom:8px}
.card:hover{border-color:#bbb;background:#fafaf8}
.card-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:5px;line-height:1.5;display:flex;align-items:center;gap:7px}
.card-meta{display:flex;gap:10px;align-items:center}
.card-source{font-size:11px;color:#4a90d9;font-weight:500}
.card-date{font-size:11px;color:#aaa}
.card-desc{font-size:12px;color:#777;margin-top:6px;line-height:1.6}
.open-link{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:#4a90d9;margin-top:6px}
.icon{display:inline-block;width:16px;height:16px;vertical-align:-3px}
.v2-row{display:flex;gap:8px;margin-bottom:14px}
.v2-row input{flex:1;padding:9px 13px;border-radius:8px;border:1px solid #e0ded6;font-size:13px;background:#fff;color:#1a1a1a;font-family:'Pretendard',sans-serif;outline:none}
.v2-row input:focus{border-color:#888}
.v2-row button{padding:9px 18px;border-radius:8px;border:1px solid #e0ded6;font-size:13px;cursor:pointer;background:#1a1a1a;color:#fff;font-family:'Pretendard',sans-serif;font-weight:500;transition:background 0.15s}
.v2-row button:hover{background:#333}
.section{display:none}
.section.active{display:block}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>비벗 뉴스 뷰어</h1>
    <p>창업·업종별 최신 뉴스 및 미팅 전 브리핑</p>
  </div>

  <div class="view-tabs">
    <div class="view-tab active" onclick="switchView('v1',this)">창업·업종 일간 뉴스</div>
    <div class="view-tab" onclick="switchView('v2',this)">미팅 전 업종 뉴스</div>
  </div>

  <div id="v1" class="section active">
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="kw-row" id="kw-row"></div>
    <div class="notice">네이버 뉴스 RSS는 브라우저 보안 정책(CORS)으로 직접 로드가 제한됩니다. 아래 버튼으로 네이버 뉴스 검색 페이지를 바로 열거나, Claude에게 요약을 요청할 수 있습니다.</div>
    <div id="v1-cards"></div>
  </div>

  <div id="v2" class="section">
    <div class="notice">미팅 예정 회사의 업종 키워드를 입력하면 관련 최신 뉴스를 네이버에서 바로 검색합니다.</div>
    <div class="v2-row">
      <input id="meeting-kw" placeholder="예: 뷰티, 헤어샵, 필라테스" onkeydown="if(event.key==='Enter')searchMeeting()"/>
      <button onclick="searchMeeting()">검색 →</button>
    </div>
    <div id="v2-cards"></div>
  </div>
</div>

<script>
const CATS=[
  {label:'소상공인',kws:['소상공인','자영업자','개인사업자']},
  {label:'프랜차이즈',kws:['프랜차이즈','가맹점','가맹사업']},
  {label:'뷰티 창업',kws:['뷰티','미용실','헤어샵','네일샵','피부관리','반영구','눈썹문신','속눈썹','왁싱']},
  {label:'식음료 창업',kws:['카페창업','식당창업','외식업','베이커리']},
  {label:'피트니스 창업',kws:['피트니스','요가','헬스장','필라테스','PT']},
  {label:'라이프 창업',kws:['세차장','꽃집','학원','모텔','코인세탁','편의점','독서실','펜션']}
];
let cur=0;

function init(){
  const el=document.getElementById('cat-tabs');
  CATS.forEach((c,i)=>{
    const t=document.createElement('div');
    t.className='cat-tab'+(i===0?' active':'');
    t.textContent=c.label;
    t.onclick=()=>selectCat(i);
    el.appendChild(t);
  });
  renderCat(0);
}

function selectCat(i){
  cur=i;
  document.querySelectorAll('.cat-tab').forEach((t,j)=>t.className='cat-tab'+(j===i?' active':''));
  renderCat(i);
}

function renderCat(i){
  const cat=CATS[i];
  document.getElementById('kw-row').innerHTML=cat.kws.map(k=>`<span class="kw-chip">${k}</span>`).join('');
  const q=encodeURIComponent(cat.kws.join(' OR '));
  const naverUrl=`https://search.naver.com/search.naver?where=news&query=${q}&sort=1`;
  const rssUrl=`https://search.naver.com/rss?where=news&query=${q}`;
  document.getElementById('v1-cards').innerHTML=`
    <div class="card" onclick="window.open('${naverUrl}','_blank')">
      <div class="card-title">📰 ${cat.label} 최신 뉴스 보기</div>
      <div class="card-meta"><span class="card-source">네이버 뉴스</span><span class="card-date">최신순 정렬</span></div>
      <div class="card-desc">키워드: ${cat.kws.join(', ')}</div>
      <div class="open-link">↗ 네이버 뉴스에서 열기</div>
    </div>
    <div class="card" onclick="window.open('${rssUrl}','_blank')">
      <div class="card-title">📡 RSS 피드 링크</div>
      <div class="card-meta"><span class="card-source">RSS</span><span class="card-date">RSS 리더 구독용</span></div>
      <div class="card-desc">이 링크를 Feedly 등 RSS 리더에 등록하면 자동으로 최신 기사를 받을 수 있습니다.</div>
      <div class="open-link">↗ RSS 링크 열기</div>
    </div>
  `;
}

function switchView(v,el){
  document.querySelectorAll('.section').forEach(s=>s.className='section');
  document.getElementById(v).className='section active';
  document.querySelectorAll('.view-tab').forEach(t=>t.className='view-tab');
  el.className='view-tab active';
}

function searchMeeting(){
  const kw=document.getElementById('meeting-kw').value.trim();
  if(!kw)return;
  const q=encodeURIComponent(kw);
  const naverUrl=`https://search.naver.com/search.naver?where=news&query=${q}&sort=1`;
  document.getElementById('v2-cards').innerHTML=`
    <div class="card" onclick="window.open('${naverUrl}','_blank')">
      <div class="card-title">📰 "${kw}" 최신 뉴스 보기</div>
      <div class="card-meta"><span class="card-source">네이버 뉴스</span><span class="card-date">최신순</span></div>
      <div class="card-desc">키워드 "${kw}" 관련 최신 뉴스를 네이버에서 바로 확인합니다.</div>
      <div class="open-link">↗ 네이버 뉴스에서 열기</div>
    </div>
  `;
}

init();
</script>
</body>
</html>
